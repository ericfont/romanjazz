name: Sort and Concatenate Files

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sort and Concatenate
        run: |
          # Sort all files in charts folder and merges into merged file
          cd charts
          for f in *; do
            sed -i 's/\t/ \t/g' "$f";
            echo "$f:" | sed 's/_/ /g' | sed 's/.tsv//g' | cat;
            cat "$f";
          done > ../all-charts.tsv

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: merged-file
          path: all-charts.tsv
