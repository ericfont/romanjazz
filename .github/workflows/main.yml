name: Sort and Concatenate Files

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sort and Concatenate
        run: |
          # Finds all files in src folder, sorts them, and merges into merged file
          cd charts
          for f in *; do printf "%s:\n" "$f"; cat "$f"; printf "\n"; done > ../all-charts.tsv

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: merged-file
          path: all-charts.tsv
