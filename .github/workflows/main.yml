name: Sort and Concatenate Files

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Sort and Concatenate
        run: |
          # Sort all files in charts folder and merges into merged file
          cd charts
          for f in *; do
            
            #remove unnecessary chars from filename
            echo "[\`$f:\`,\n\`" | sed 's/_/ /g' | sed 's/.tsv//g' | cat;

            #print the file contents with space
            cat "$f";
            printf "\`]\n,";
            
          done > ../all-charts-tabs.txt

          cd ..

          cat all-charts-tabs.txt

          #changes tabs to space in filename (better for pixel watch's small display)
          sed 's/\t/ /g' "all-charts-tabs.txt" > "all-charts-spaces.txt";

          python "code/compress-txt.py"

          mkdir site
          cp code/scroll-list-display.html site/index.html
          cp all-charts-spaces.txt site/romanjazz-spaces.txt
          cp all-charts-tabs.txt site/romanjazz.txt

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: merged-file
          path: |
            all-charts-tabs.txt
            all-charts-spaces.txt

      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN}}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: romanjazz # Cloudflare Pages project name
          directory: site
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          