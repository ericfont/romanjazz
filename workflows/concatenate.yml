name: Sort and Concatenate Files

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sort and Concatenate
        run: |
          # Finds all .txt files in src folder, sorts them, and merges into merged.txt
          cat $(find src -name "*.adoc" | sort) > merged.adoc
          
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: merged-file
          path: merged.adoc
