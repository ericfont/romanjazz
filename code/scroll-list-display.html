<!DOCTYPE html>
<html>
<head>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Noto+Music&display=swap" rel="stylesheet">
    <style>
    
		body, select {
			font-family: 'Noto Music', Arial, Helvetica, sans-serif;
			}

    </style>
</head>
<body>

    <div style="display: flex;">

        <!-- 2. The List Area -->
        <div id="listArea" style="height: 95vh; overflow-y: auto;">
            <select name="selectSongList" size=42 id="selectSongList" style="overflow: hidden;">
            </select>
        </div>

        <!-- 2. The Output Area -->
        <div id="outputArea">

             <div style="display: flex;">
				<div>
                	<button onclick="toggleHideList()">⬅ Song Selector</button>
				</div>
				<div id="selectedSongTitleArea">
                	&emsp;no song selected. Select song from list on the left.
				</div>
            </div>
			<div id="chartDisplayArea">
                <bk>
                For offline use, download <a href="https://romanjazz.com/romanjazz.txt" download="romanjazz.txt" class="download-btn">romanjazz.txt</a> and this page <a href="https://romanjazz.com/index.html" download="romanjazz.html" class="download-btn">index.html</a> (you may also need to install <a href="https://fonts.google.com/noto/specimen/Noto+Music">Noto Music</a>, see <a href="https://fonts.google.com/knowledge/using_type/installing_and_managing_fonts">google's instructions</a>).
                <bk>
			    <div id="fontTestArea">
                </div>
                <bk>
                Report chart issues to <a href="http://github.com/ericfont/romanjazz/issues">github.com/ericfont/romanjazz/issues</a> for review.
            </div>
        </div>
    </div>

<script>

const selectSongListElement = document.getElementById("selectSongList");
const chartDisplayAreaElement = document.getElementById("chartDisplayArea");
const selectedSongTitleArea = document.getElementById("selectedSongTitleArea");
const fontTestArea = document.getElementById("fontTestArea");

document.fonts.ready.then(() => {
  const isInstalled = document.fonts.check("16px 'Noto Music'");
  if (isInstalled) {
    chartDisplayAreaElement.innerHTML = "Noto Music font is installed and ready to use.";
  } else {
    chartDisplayAreaElement.innerHTML = "Noto Music font is not installed. Please install it for the best experience.";
  }
});

function main() {

    console.log("Populating song list...");

    for (let i = 0; i < charts.length; i++) {
        let el = document.createElement("option");
        el.textContent = i + ": " + charts[i][0];
        el.value = i;
        selectSongListElement.appendChild(el);
    }

    // Update the chart area when a new song is selected
    selectSongListElement.addEventListener('change', (event) => {
        const selectedIndex = event.target.value;
        selectedSongTitleArea.innerHTML = charts[selectedIndex][0]; // Update the selected song title display
        chartDisplayAreaElement.innerHTML = charts[selectedIndex][1] + '<bk>'; // put the metadata
        const chartLines = charts[selectedIndex][2].split("\n");
        for (let i = 0; i < chartLines.length; i++) {
            chartDisplayAreaElement.innerHTML += chartLines[i] + "<br>";
        }
    });

    // Parse the string into tokens using a space " " as the separator

    // Display the separated tokens
  //  tokens.forEach(token => {
    //console.log(token);
    //});
}

function toggleHideList() {
    var x = document.getElementById("listArea");
    x.style.display = (x.style.display === "none") ? "block" : "none";
}


const charts =
[[`'0-Blank-Chart form composer lyricist year usualkey`,

`A₁:	Ⅰ	𝄎	♯i°	𝄎
	ⅱ	Ⅴ⁷	Ⅰ	𝄎
A₂:	Ⅰ	𝄎	♯i°	𝄎
	ⅱ	Ⅴ⁷	Ⅰ	₃[ⅱ·Ⅴ⁷]
B:	₃[Ⅰ	ⅱ·Ⅴ⁷	Ⅰ	ⅱ·Ⅴ⁷]
	Ⅲ⁷	Ⅵ⁷	Ⅱ⁷	Ⅴ⁷
A₃:	Ⅰ	𝄎	♯i°	𝄎
	ⅱ	Ⅴ⁷	Ⅰ	𝄎
`],
[`500-Miles-High Chick-Corea Neville-Potter 1972 e`,
`A:	𝄆E-	𝄎	G-	𝄎
	B♭	𝄎	Bø	E⁷

𝄌:	𝄆C-	𝄎	Ab	𝄎𝄇
`]
];
main(); 
</script>
</body>
</html>
