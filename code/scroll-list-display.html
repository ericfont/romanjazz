<script>

function toggleHideList() {
    var x = document.getElementById("listArea");
    x.style.display = (x.style.display === "none") ? "block" : "none";

let selectSongListElement = document.getElementById("selectSongList");

for (let i = 0; i < 3; i++) {
    let optn = i+1;
    let el = document.createElement("option");
    el.textContent = optn + ": " + charts[i][0];
    el.value = optn;
    selectSongListElement.appendChild(el);
}

function showSelection() {
    // Get the select element
    var list = document.getElementById("selectSongList");
    // Get the value of the selected option
    var selectedValue = list.value;
    // Display the value in the output area
    document.getElementById("displayArea").innerText = "Selected: " + selectedValue;
}
