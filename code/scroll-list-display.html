    var x = document.getElementById("listArea");
    x.style.display = (x.style.display === "none") ? "block" : "none";

    let el = document.createElement("option");
    el.textContent = i + ": " + charts[i][0];
    el.value = i;
    selectSongListElement.appendChild(el);
}

// Update the chart area when a new song is selected
selectSongListElement.addEventListener('change', (event) => {
	const selectedIndex = event.target.value;
	selectedSongTitleArea.innerHTML = charts[selectedIndex][0]; // Update the selected song title display
	chartDisplayAreaElement.innerHTML = ""; // Clear previous chart
	const chartLines = charts[selectedIndex][1].split("\n");
	for (let i = 0; i < chartLines.length; i++) {
		chartDisplayAreaElement.innerHTML += chartLines[i] + "<br>";
