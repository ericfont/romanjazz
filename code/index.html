<!DOCTYPE html>
<html lang="en" style="display: flex; height: 100vh">
<head>
	<link href="https://fonts.cdnfonts.com/css/quivira" rel="stylesheet">

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

	<base href="https://romanjazz.com/" target="_blank">

	<style>
		:root {
			color-scheme: light dark;
			--transparent-gray-button-color: rgba(128, 128, 128, 0.5);
		}

		body, select, textarea, table, tr, td {
			color: light-dark(#000000, #efefec);
			background-color: light-dark(#efedea, #000000);
			font-family: 'Quivira', 'Noto Music' !important;
		}

		table {
			width: 100%;
			height: 100%;
			table-layout: fixed;
			border-collapse: collapse;
			user-select: none;
		}

		/* Uncomment for dotted grid */
		td {
			border: 1px dotted #808080;
			padding: 8px;
			text-align: left;
		}

		.section-name {
			padding: 1px;
			border: 1px solid light-dark(#000000, #efefec);
		}

		.right-justify-cell {
 			text-align: right;
		}

		.center-justify-cell {
 			text-align: center;
		}

		.draw-right-border {
			border-right: 1px solid black;
		}

		.draw-left-border {
			border-left: 1px solid black;
		}

		.transparent-button {
			background: transparent;
			border: 2px solid var(--transparent-gray-button-color);
			color: var(--transparent-gray-button-color);
			position: absolute;
			padding: 0px 0px 0px 0px;
			cursor: pointer;
			width: 33%;
			height: 33%;
		}

	</style>
</head>
<body style="display: flex; flex-grow: 1;">
	<!-- List Area -->
	<div id="listDiv" style="flex: 1; flex-direction: column; height: 100vh;">
		<div id="listDivHeader" style="display: flex; flex-direction: row; align-items: center; padding: 8px;">
			<select name="playlist" id="selectPlaylist" style="flex-grow: 1">
				<option value="embedded">embedded</option>
				<option value="localStorage">localStorage (TODO)</option>
			</select>
			<div style="flex-grow: 1"></div>
			<select name="settings" id="selectSettings" onchange="selectSettings(this.value)" style="flex-grow: 1">
				<option>Settings Menu</option>
				<option value="toggleDarkMode">Toggle Dark Mode</option>
				<option value="showInvisibleNavigationButtons">Show Invisible Navigation Buttons</option>
			</select>
		</div>
		<select name="selectSongList" size=42 id="selectSongList" style="overflow: hidden; width: 100%;">
		</select>
	</div>

	<!-- Output Area -->
	<div id="outDiv" style="flex: 1; flex-grow: 1; display: flex; flex-direction: column; position: relative">

		<!-- Transparent Buttons -->
		<button onclick="selectorToggle()" class="transparent-button" style="top: 0; left: 0;">
			<b>Toggle&nbsp;Panel</b><br>(invisible&nbsp;button in top‑left corner of chart area)
		</button>
		<button class="transparent-button" style="top: 0; right: 0;">
			<b>Previous&nbsp;Song</b><br>(invisible&nbsp;button in top‑right corner of chart area)
		</button>
		<button class="transparent-button" style="bottom: 0; left: 0;">
			<b>Random &nbsp;Song</b><br>(invisible&nbsp;button in bottom‑left corner of chart area)
		</button>
		<button class="transparent-button" style="bottom: 0; right: 0;">
			<b>Next&nbsp;Song</b><br>(invisible&nbsp;button in bottom‑right corner of chart area)
		</button>

		<div id="outContentsDiv" style="overflow: hidden; width: 100%; flex-grow: 1;"></div>
	</div>

<script>

const selectSongListElement = document.getElementById("selectSongList");
const listDiv = document.getElementById("listDiv");
const outDiv = document.getElementById("outDiv");
const outContentsDiv = document.getElementById("outContentsDiv");
const outTitleDiv = document.getElementById("outTitleDiv");
const root = document.documentElement;
const selectSettingsElement = document.getElementById("selectSettings");

function housekeepingToDoBeforePerformingSelectorAction() {
	root.style.setProperty('--transparent-gray-button-color', 'rgba(128, 128, 128, 0)'); // make fully transparent

	// would want to check to save any unsaved changes here
}

function clearOutContentsDiv() {
	outContentsDiv.innerHTML = '';
}

function showInvisibleNavigationButtons() {
	root.style.setProperty('--transparent-gray-button-color', 'rgba(128, 128, 128, 0.5)'); // make semi-transparent
}

function selectSettings(settingsValue) {
	housekeepingToDoBeforePerformingSelectorAction();

	switch (settingsValue) {
		case 'toggleDarkMode':
			toggleDarkMode();			
			break;
	
		case 'showInvisibleNavigationButtons':
			showInvisibleNavigationButtons();	
			break;

		default:
			break;
	}
	selectSettingsElement.selectedIndex = 0;
}

async function checkFonts() {
	try {
		outContentsDiv.innerHTML += `<p>Checking for necessary fonts. Your browser might request you accept the query.</p>`;
		const fonts = await window.queryLocalFonts();
		console.log(fonts);

		const isQuiviraInstalled = fonts.some(f => f.family === "Quivira");
		if (isQuiviraInstalled) {
			outContentsDiv.innerHTML += `<p>✓ Quivira font FOUND in queryLocalFonts().</p>`;
			}
		else {
			outContentsDiv.innerHTML += `<p>✗ Quivira font NOT in queryLocalFonts(). You should install <a href="https://fonts.google.com/noto/specimen/Noto+Music">Noto Music</a> (see <a href="https://fonts.google.com/knowledge/using_type/installing_and_managing_fonts">google's instructions</a>) so you can correctly see the musical notation.</p>`;
			}

		const isNotoMusicInstalled = fonts.some(f => f.family === "Noto Music");
		if (isNotoMusicInstalled) {
			outContentsDiv.innerHTML += `<p>✓ Noto Music font FOUND in queryLocalFonts().</p>`;
			}
		else {
			outContentsDiv.innerHTML += `<p>✗ Noto Music font NOT in queryLocalFonts(). You should install <a href="https://fonts.google.com/noto/specimen/Noto+Music">Noto Music</a> (see <a href="https://fonts.google.com/knowledge/using_type/installing_and_managing_fonts">google's instructions</a>) so you can correctly see the musical notation.</p>`;
			}

	} catch (error) {
		console.error(error.name, error.message);
	}
}

function selectorToggle() {
	if( listDiv.style.display === "none" ) {
		listDiv.style.display = "block";
		outDiv.style.width = "50%";
	}
	else {
		listDiv.style.display = "none";
		outDiv.style.width = "100%";
	}

}

// Write a html table string to the output area based on input chart strings
function loadSong(chartTitle, chartSubtitle, chartString) {
	housekeepingToDoBeforePerformingSelectorAction();

	console.log(`Loading ${chartTitle}...`);

	var html = `<table><caption><strong><u>${chartTitle}</u></strong><br>${chartSubtitle}</caption>`;

	const cellsPerBar = 4;
	var barsPerLine = 0; // will be set based on first line

	// Split by newlines
	const chartLines = chartString.split('\n');

	// Iterate over each line
	chartLines.forEach((line, index) => {

		// Split by tabs
		const lineCells = line.split('\t');

		if( lineCells.length == 1 ) {
			console.log("Reached final empty line of song.");
			return;
		}

		// set barsPerLine based on the first line, which should be the longest. Abort rendering if any subsequent line has more bars, to avoid formatting issues.
		if( index == 0 ) {
			barsPerLine = lineCells.length - 1;
			console.log(`barsPerLine: ${barsPerLine}`);
		}
		else if( lineCells.length - 1 > barsPerLine ) {
			outContentsDiv.innerHTML = `Line ${index} has more bars (${lineCells.length - 1}) than the first line (${barsPerLine}), which will cause formatting issues. Aborting chart render.`;
			return;
		}

		// add an extra empty row between each line for spacing
		html += '<tr>';

		// If first cell contains an optional section name, wrap in a span with boxed style
		html += '<td>';
		if( lineCells[0] !== "" ) {
			html += `<span class="section-name">${lineCells[0]}</span> `;
		}
		else {
			html += '?';
		}

		// end empty row, and start next one
		html += '</tr><tr>';

		// Process each measure lineCells[i]
		for(let i = 1; i < lineCells.length; i++) {
			if(lineCells[i] === "") {
				console.log("Empty cell.");
			}
			else if(lineCells[i] === "𝄎") {
				html += `<td colspan="${cellsPerBar} rowspan="2" class="center-justify-cell">𝄎</td>`;
			}
			else if(lineCells[i] === "𝄏") {
				html += `<td colspan="${cellsPerBar*2}" rowspan="2" class="center-justify-cell">𝄏</td>`;
				i++;
			}
			else {
				let remainingCellsInBar = cellsPerBar;
				const cdotSplit = lineCells[i].split('·');
				for(let cdotSplitIndex = 0; cdotSplitIndex < cdotSplit.length; cdotSplitIndex++) {

					// make a cell with the contents if not empty
					if( cdotSplit[cdotSplitIndex] !== "" ) {
						html += '<td rowspan="2">';
						html += cdotSplit[cdotSplitIndex];
						html += '</td>';
						remainingCellsInBar--;
					}

					// existance of cdot indicates an empty beat
					if( cdotSplitIndex + 1 < cdotSplit.length && remainingCellsInBar > 0) {
						html += '<td rowspan="2"></td>';
						remainingCellsInBar--;
					}
				}
				while(remainingCellsInBar > 0) {
					html += '<td rowspan="2"></td>';
					remainingCellsInBar--;
				}
			}

			// will need to handle barline at end of this measure
		}

		// add another row, since each line of music spans two table rows
		html += '</tr><tr>';
	/*	for(let i = 0; i < barsPerLine * cellsPerBar; i++) {
			html += '<td></td>';
		}*/
		html += '</tr>';

	});

	html += '</table>';

	outContentsDiv.innerHTML = html;
}

selectSongListElement.addEventListener('change', (event) => {
	housekeepingToDoBeforePerformingSelectorAction();
	const selectedSongIndex = event.target.value;
	loadSong(charts[selectedSongIndex][0], charts[selectedSongIndex][1], charts[selectedSongIndex][2]);
});

function toggleHideList() {
	if( listDiv.style.display === "none" ) {
		listDiv.style.display = "block";
		outDiv.style.width = "50%";
	}
	else {
		listDiv.style.display = "none";
		outDiv.style.width = "100%";
	}

}

function toggleDarkMode() {
	const html = document.documentElement;
	const currentScheme = getComputedStyle(html).colorScheme;
	html.style.colorScheme = (currentScheme === 'dark') ? 'light' : 'dark';

	// Save preference to localStorage
	localStorage.setItem('theme', html.style.colorScheme);
}

// Get preference from localStorage
const savedTheme = localStorage.getItem('theme');
if (savedTheme) {
	const html = document.documentElement;
	html.style.colorScheme = savedTheme;
}

function main() {
	
	console.log("Populating song list...");

	for (let i = 0; i < charts.length; i++) {
		let el = document.createElement("option");
		el.textContent = i + ": " + charts[i][0];
		el.value = i;
		selectSongListElement.appendChild(el);
	}
}
