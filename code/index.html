<body style="display: flex; flex-grow: 1;">
	<!-- List Area -->
	<div id="listDiv" style="flex: 1; flex-direction: column; height: 100vh;">

			<select id="selectPlaylist" onchange="selectPlaylist(this.value)">
				<option>Playlists</option>
				<optgroup label="Embedded Playlists">
					<option value="embeddedJazzPlaylist" selected>embeddedJazz</option>

				</optgroup>
			</select>
			<div>&emsp;</div>
			<button id="buttonEditOrSaveChart" onclick="buttonEditOrSaveChart()">Edit</button>
			<div>&emsp;</div>

<script>

const selectSongListElement = document.getElementById("selectSongList");

const chartEditDiv = document.getElementById("chartEditDiv");
const chartTitleTextArea = document.getElementById("chartTitleTextArea");
const chartSubtitleTextArea = document.getElementById("chartSubtitleTextArea");
const chartContentsTextArea = document.getElementById("chartContentsTextArea");

const listDiv = document.getElementById("listDiv");
const outDiv = document.getElementById("outDiv");
const outContentsDiv = document.getElementById("outContentsDiv");
const outTitleDiv = document.getElementById("outTitleDiv");
const root = document.documentElement;

const selectPlaylistElement = document.getElementById("selectPlaylist");
const selectSettingsElement = document.getElementById("selectSettings");
const buttonEditOrSaveChartElement = document.getElementById("buttonEditOrSaveChart");

var currentPlaylist = 'embeddedJazzPlaylist';
var currentChartIndex = 0;

function loadPlaylistHousekeeping() {
	chartEditDiv.hidden = true;
	selectSongListElement.hidden = false;
	buttonEditOrSaveChartElement.textContent = "Edit";
	selectSongListElement.replaceChildren(); // clear existing songs
}

function loadEmbeddedJazzPlaylist() {
	loadPlaylistHousekeeping();

	console.log("Populating embeddedJazz playlist...");
	
	for (let i = 0; i < charts.length; i++) {
		let el = document.createElement("option");
		el.textContent = i + ": " + charts[i][0];
		el.value = i;
		selectSongListElement.appendChild(el);
	}
}

function loadLocalStorageDefaultPlaylist() {
	loadPlaylistHousekeeping();

	console.log("Populating localStorageDefault playlist...");

	for (let i = 0; i < localStorage.length; i++) {
		const key = localStorage.key(i);
		const keyParts = key.split("\n");
		if (keyParts[0] === "save") {
			const timestamp = keyParts[1];
			const title = keyParts[2];
			const subtitle = keyParts[3];
			let el = document.createElement("option");
			el.textContent = `${timestamp}\t${title}\t${subtitle}`;
			el.value = key;
			selectSongListElement.appendChild(el);
		}
	}
}

function saveChart() {
	//charts[selectSongListElement.value][2] = chartTextArea.value;
	//loadSong(charts[selectSongListElement.value][0], charts[selectSongListElement.value][1], charts[selectSongListElement.value][2]);

	const now = new Date();
	const localNow = new Date(now.getTime() - (now.getTimezoneOffset() * 60000));
	const formattedDate = localNow.toISOString()
		.slice(0, 19)       // Take only YYYY-MM-DDTHH:mm:ss
		.replace('T', '_'); // Change the separator to an underscore

	localStorage.setItem(`save\n${formattedDate}\n${chartTitleTextArea.value}\n${chartSubtitleTextArea.value}`, chartContentsTextArea.value);
}

function editChart() {
	selectSongListElement.hidden = true;
	chartEditDiv.hidden = false;
	buttonEditOrSaveChartElement.textContent = "Save";
	selectPlaylistElement.selectedIndex = 0;

	//charts[selectSongListElement.value][2] = chartTextArea.value;
	//loadChart(charts[selectSongListElement.value][0], charts[selectSongListElement.value][1], charts[selectSongListElement.value][2]);
}

function buttonEditOrSaveChart() {

	if( buttonEditOrSaveChartElement.textContent === "Edit" ) {
		editChart();
	}

	else if( buttonEditOrSaveChartElement.textContent === "Save" ) {
		saveChart();
	}
}

function selectPlaylist(selectPlaylistValue) {

	if( buttonEditOrSaveChartElement.textContent === "Save" ) {
		saveChart();
	}

	switch (selectPlaylistValue) {
		case 'embeddedJazzPlaylist':
			currentPlaylist = selectPlaylistValue;
			loadEmbeddedJazzPlaylist();
			break;
	
		case 'localStorageDefaultPlaylist':
			currentPlaylist = selectPlaylistValue;
			loadLocalStorageDefaultPlaylist();
			break;

		default:
			break;
	}
}

function housekeepingToDoBeforePerformingAction() {
	const rootStyles = window.getComputedStyle(document.documentElement);
	root.style.setProperty('--current-gray-button-color', rootStyles.getPropertyValue('--fully-transparent-color')); // make buttons invisible

	// would want to check to save any unsaved changes here
}

function clearOutContentsDiv() {
	outContentsDiv.innerHTML = '';
}

function showInvisibleNavigationButtons() {
	const rootStyles = window.getComputedStyle(document.documentElement);
	const buttonCurrentColor = rootStyles.getPropertyValue('--current-gray-button-color');
	if( buttonCurrentColor === rootStyles.getPropertyValue('--fully-transparent-color') ) {
		root.style.setProperty('--current-gray-button-color', rootStyles.getPropertyValue('--semi-transparent-gray-color')); // make semi-transparent
	}
	else {
		root.style.setProperty('--current-gray-button-color', rootStyles.getPropertyValue('--fully-transparent-color')); // make invisible
	}
}

function selectSettings(settingsValue) {

	switch (settingsValue) {
		case 'toggleDarkMode':
			housekeepingToDoBeforePerformingAction();
			toggleDarkMode();			
			break;
	
		case 'showInvisibleNavigationButtons':
			showInvisibleNavigationButtons();	
			break;

		case 'checkFonts':
			housekeepingToDoBeforePerformingAction();
			outContentsDiv.innerHTML = '';
			checkFonts();
			break;

		default:
			break;
	}
	selectSettingsElement.selectedIndex = 0;
}

async function checkFonts() {
	try {
		outContentsDiv.innerHTML += `<p>Checking for necessary fonts. Your browser might request you accept the query.</p>`;
		const fonts = await window.queryLocalFonts();
		console.log(fonts);

		const isQuiviraInstalled = fonts.some(f => f.family === "Quivira");
		if (isQuiviraInstalled) {
			outContentsDiv.innerHTML += `<p>โ Quivira font FOUND in queryLocalFonts().</p>`;
			}
		else {
			outContentsDiv.innerHTML += `<p>โ Quivira font NOT in queryLocalFonts(). You should install <a href="https://fonts.google.com/noto/specimen/Noto+Music">Noto Music</a> (see <a href="https://fonts.google.com/knowledge/using_type/installing_and_managing_fonts">google's instructions</a>) so you can correctly see the musical notation.</p>`;
			}

		const isNotoMusicInstalled = fonts.some(f => f.family === "Noto Music");
		if (isNotoMusicInstalled) {
			outContentsDiv.innerHTML += `<p>โ Noto Music font FOUND in queryLocalFonts().</p>`;
			}
		else {
			outContentsDiv.innerHTML += `<p>โ Noto Music font NOT in queryLocalFonts(). You should install <a href="https://fonts.google.com/noto/specimen/Noto+Music">Noto Music</a> (see <a href="https://fonts.google.com/knowledge/using_type/installing_and_managing_fonts">google's instructions</a>) so you can correctly see the musical notation.</p>`;
			}

	} catch (error) {
		console.error(error.name, error.message);
	}
}

function selectorToggle() {
	if( listDiv.style.display === "none" ) {
		listDiv.style.display = "block";
		outDiv.style.width = "50%";
	}
	else {
		listDiv.style.display = "none";
		outDiv.style.width = "100%";
	}

}

// Write a html table string to the output area based on input chart strings
function loadChart() {
	const chartTitle = chartTitleTextArea.value;
	const chartSubtitle = chartSubtitleTextArea.value;
	const chartString = chartContentsTextArea.value;

	housekeepingToDoBeforePerformingAction();

	console.log(`Loading ${chartTitle}...`);


	const cellsPerBar = 4;
	var barsPerLine = 0; // will be set based on first line

	// Split by newlines
	const chartLines = chartString.split('\n');

	// count number of lines of text, to estimate font size
	var numTextLines = 3; // account for title, subtitle, and extra slack
	chartLines.forEach((line, index) => {
		if( line[0] === '\t' ) {
			numTextLines += 2; // account for possibly two stacked chord symbols for modulations
		}
		else {
			numTextLines += 4; // account for addition section name line
		}
	});

	// calculate font size
	var calculatedFontSize = window.innerHeight / numTextLines;
	calculatedFontSize = Math.max(calculatedFontSize, 6); // don't make too small to read
	
	var html = `<table style="font-size: ${calculatedFontSize}px;"><caption><strong><u>${chartTitle}</u></strong><br>${chartSubtitle}</caption>`;

	// Iterate over each line
	chartLines.forEach((line, index) => {

		// Split by tabs
		const lineCells = line.split('\t');

		if( lineCells.length == 1 ) {
			console.log("Reached final empty line of song.");
			return;
		}

		// set barsPerLine based on the first line, which should be the longest. Abort rendering if any subsequent line has more bars, to avoid formatting issues.
		if( index == 0 ) {
			barsPerLine = lineCells.length - 1;
			console.log(`barsPerLine: ${barsPerLine}`);
		}
		else if( lineCells.length - 1 > barsPerLine ) {
			outContentsDiv.innerHTML = `Line ${index} has more bars (${lineCells.length - 1}) than the first line (${barsPerLine}), which will cause formatting issues. Aborting chart render.`;
			return;
		}

		// add an extra empty row between each line for spacing
		html += '<tr>';

		// If first cell contains an optional section name, wrap in a span with boxed style
		if( lineCells[0] !== "" ) {
			html += `<td><span class="section-name">${lineCells[0]}</span></td>`;
		}
		else {
			html += '<td style="height: 10px;"></td>';
		}

		// end empty row
		html += '</tr>';
		
		// start next line
		html += '<tr>';

		// Process each measure lineCells[i]
		for(let i = 1; i < lineCells.length; i++) {
			let maybeBarStyle = `style="border-left: 1px solid grey; padding-left: 6px;"`;
			if(lineCells[i] === "") {
				console.log("Empty cell.");
			}
			else if(lineCells[i] === "๐") {
				html += `<td ${maybeBarStyle}colspan="${cellsPerBar} class="center-justify-cell">๐</td>`;
			}
			else if(lineCells[i] === "๐") {
				html += `<td ${maybeBarStyle} colspan="${cellsPerBar*2}" class="center-justify-cell">๐</td>`;
				i++;
			}
			else {
				let remainingCellsInBar = cellsPerBar;

				const cdotSplit = lineCells[i].split('ยท');
				for(let cdotSplitIndex = 0; cdotSplitIndex < cdotSplit.length; cdotSplitIndex++) {

					// make a cell with the contents if not empty
					if( cdotSplit[cdotSplitIndex] !== "" ) {
						const cdotCurrSplit = cdotSplit[cdotSplitIndex];
						var subscriptedPrefix = "";
						var unsubscriptedContent = "";

						const beginModulationSplit = cdotCurrSplit.split(':');
						if ( beginModulationSplit.length > 1 ) {
							subscriptedPrefix = `<sub><b>${beginModulationSplit[0]}</b></sub>`;
							unsubscriptedContent = beginModulationSplit[1];
						}
						else {
							unsubscriptedContent = cdotCurrSplit;
						}
						
						html += `<td ${maybeBarStyle}>${subscriptedPrefix}${unsubscriptedContent}</td>`;
						

						remainingCellsInBar--;
						maybeBarStyle = '';
					}

					// existance of cdot indicates an empty beat
					if( cdotSplitIndex + 1 < cdotSplit.length && remainingCellsInBar > 0) {
						html += `<td ${maybeBarStyle}></td>`;
						remainingCellsInBar--;
						maybeBarStyle = '';
					}

				}
				
				while(remainingCellsInBar > 0) {
					html += '<td></td>';
					remainingCellsInBar--;
				}
			}
		}

		// will need to handle barline at end of each line
		html += `<td style="border-left: 1px solid grey"></td>`;

		// end row
		html += `</tr>`;	

	});

	html += '</table>';

	outContentsDiv.innerHTML = html;
}

selectSongListElement.addEventListener('change', (event) => {
	housekeepingToDoBeforePerformingAction();
	const selectedSong = event.target.value;

	if( currentPlaylist === 'localStorageDefaultPlaylist' ) {
		const selectedSongSplit = selectedSong.split("\n");
		if( selectedSongSplit.length < 3 ) {
			outContentsDiv.innerHTML = `Error: saved chart string does not have the expected format of "title\\nsubtitle\\ncontents". Aborting chart render.`;
		}
		else {
			chartTitleTextArea.value = selectedSongSplit[2];
			chartSubtitleTextArea.value = selectedSongSplit[3];
			chartContentsTextArea.value = localStorage.getItem(selectedSong);
			loadChart();
		}
	}
	else if( currentPlaylist === 'embeddedJazzPlaylist' ) {
		chartTitleTextArea.value = charts[selectedSong][0];
		chartSubtitleTextArea.value = charts[selectedSong][1];
		chartContentsTextArea.value = charts[selectedSong][2];
		loadChart();
	}
});

function loadNextChart() {

	currentChartIndex++;
	if( currentChartIndex >= charts.length ) {
		currentChartIndex = charts.length-1;
	}

	chartTitleTextArea.value = charts[currentChartIndex][0];
	chartSubtitleTextArea.value = charts[currentChartIndex][1];
	chartContentsTextArea.value = charts[currentChartIndex][2];
	loadChart();
}

function loadPreviousChart() {

	currentChartIndex--;
	if( currentChartIndex < 0 ) {
		currentChartIndex = 0;
	}

	chartTitleTextArea.value = charts[currentChartIndex][0];
	chartSubtitleTextArea.value = charts[currentChartIndex][1];
	chartContentsTextArea.value = charts[currentChartIndex][2];
	loadChart();
}

function loadRandomChart() {
	currentChartIndex = Math.floor(Math.random() * charts.length);
	chartTitleTextArea.value = charts[currentChartIndex][0];
	chartSubtitleTextArea.value = charts[currentChartIndex][1];
	chartContentsTextArea.value = charts[currentChartIndex][2];
	loadChart();
}

function toggleHideList() {
	if( listDiv.style.display === "none" ) {
		listDiv.style.display = "block";
		outDiv.style.width = "50%";
	}
	else {
		listDiv.style.display = "none";
		outDiv.style.width = "100%";
	}

}

function toggleDarkMode() {
	const html = document.documentElement;
	const currentScheme = getComputedStyle(html).colorScheme;
	html.style.colorScheme = (currentScheme === 'dark') ? 'light' : 'dark';

	// Save preference to localStorage
	localStorage.setItem('theme', html.style.colorScheme);
}

// Get preference from localStorage
const savedTheme = localStorage.getItem('theme');
if (savedTheme) {
	const html = document.documentElement;
	html.style.colorScheme = savedTheme;
}

function main() {

	loadEmbeddedJazzPlaylist();
}
