async function checkFonts() {
    try {
        chartDisplayAreaElement.innerHTML += `<p>Checking font installation...there might be a popup to accept.</p>`;
        const fonts = await window.queryLocalFonts();
        console.log(fonts);
        const isInstalled = fonts.some(f => f.family === "Noto Music");
        if (isInstalled) {
            chartDisplayAreaElement.innerHTML += `<p>✓ Noto Music font is installed.</p>`;
            }
        else {
            chartDisplayAreaElement.innerHTML += `<p>✗ Noto Music font is not installed. You should install <a href="https://fonts.google.com/noto/specimen/Noto+Music">Noto Music</a> (see <a href="https://fonts.google.com/knowledge/using_type/installing_and_managing_fonts">google's instructions</a>) so you can correctly see the musical notation.</p>`;
            }
    } catch (error) {
    console.error(error.name, error.message);
  }
}

async function logFontData() {
  try {

    const availableFonts = await window.queryLocalFonts();

      console.log(fontData.style);          // e.g., "Bold"
    }
  } catch (err) {
    // Handle errors (e.g., permission denied)
    console.error(err.name, err.message);
  }
}

function toggleHideList() {
    var x = document.getElementById("listArea");
    x.style.display = (x.style.display === "none") ? "block" : "none";
}

function toggleDarkMode() {
    const html = document.documentElement;
    const currentScheme = getComputedStyle(html).colorScheme;
    html.style.colorScheme = (currentScheme === 'dark') ? 'light' : 'dark';

    // Save preference to localStorage
    localStorage.setItem('theme', html.style.colorScheme);
}

// Get preference from localStorage
const savedTheme = localStorage.getItem('theme');
if (savedTheme) {
    const html = document.documentElement;
    html.style.colorScheme = savedTheme;
