<!DOCTYPE html>
<html lang="en">
<head>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Noto+Music&display=swap" rel="stylesheet">
	<base href="https://romanjazz.com/" target="_blank">

	<style>
		:root {
			color-scheme: light dark;
		}
		body, select, textarea, table {
			color: light-dark(#000000, #efefec);
			background-color: light-dark(#efedea, #000000);
			font-family: 'Noto Music', Arial, Helvetica, sans-serif;
		}

		table {
			width: 100%;
			height: 100%;
			table-layout: fixed;
			border-collapse: collapse;
		}

		.section-name {
			padding: 0px;
			border: 1px solid light-dark(#000000, #efefec);
		}

		.right-justify-cell {
 			text-align: right;
		}

		.center-justify-cell {
 			text-align: center;
		}
	</style>
</head>
<body>

	<div style="display: flex;">

		<!-- List Area -->
		<div id="listDiv" style="height: 95vh; overflow-y: auto; width: 50%; display: block;">
			<select name="playlist" id="selectPlaylist" style="width: 100%;">
				<option value="embedded">embedded</option>
				<option value="localStorage">localStorage</option>
			</select>
			<select name="selectSongList" size=42 id="selectSongList" style="overflow: hidden; width: 100%;">
			</select>
		</div>

		<!-- Output Area -->
		<div id="outDiv" style="width: 50%; height: 100%;">

			 <div style="display: flex;">
				<div>
					<button onclick="toggleHideList()">⬅ Selector</button>
				</div>
				<div id="outTitleDiv">
					&emsp; Select <i>song</i> from list on the left.
				</div>
			</div>
			<div id="outContentsDiv" style="width: 100%; height: 100%;">
				<button onclick="toggleDarkMode()">Toggle Dark/Light Mode</button>
				<p>Report chart issues to <a href="http://github.com/ericfont/romanjazz/issues">github.com/ericfont/romanjazz/issues</a> for review.</p>
				<p>For offline use, download <a href="romanjazz.txt" download="romanjazz.txt" class="download-btn">romanjazz.txt</a> and this page <a href="index.html" download="romanjazz.html" class="download-btn">index.html</a>.</p>
				<button onclick="checkFonts()">Check if Noto Music font ready</button>
			</div>
		</div>
	</div>

<script>

const selectSongListElement = document.getElementById("selectSongList");
const listDiv = document.getElementById("listDiv");
const outDiv = document.getElementById("outDiv");
const outContentsDiv = document.getElementById("outContentsDiv");
const outTitleDiv = document.getElementById("outTitleDiv");
	

async function checkFonts() {
	try {
		outContentsDiv.innerHTML += `<p>Checking for necessary fonts. Your browser might request you accept the query.</p>`;
		const fonts = await window.queryLocalFonts();
		console.log(fonts);
		const isInstalled = fonts.some(f => f.family === "Noto Music");
		if (isInstalled) {
			outContentsDiv.innerHTML += `<p>✓ Noto Music font FOUND in queryLocalFonts().</p>`;
			}
		else {
			outContentsDiv.innerHTML += `<p>✗ Noto Music font NOT in queryLocalFonts(). You should install <a href="https://fonts.google.com/noto/specimen/Noto+Music">Noto Music</a> (see <a href="https://fonts.google.com/knowledge/using_type/installing_and_managing_fonts">google's instructions</a>) so you can correctly see the musical notation.</p>`;
			}
	} catch (error) {
		console.error(error.name, error.message);
	}
}

function showSettings() {
	if( listDiv.style.display === "none" ) {
		listDiv.style.display = "block";
		outDiv.style.width = "50%";
	}
	else {
		listDiv.style.display = "none";
		outDiv.style.width = "100%";
	}

}

function main() {
	
	console.log("Populating song list...");

	for (let i = 0; i < charts.length; i++) {
		let el = document.createElement("option");
		el.textContent = i + ": " + charts[i][0];
		el.value = i;
		selectSongListElement.appendChild(el);
	}

	// Update the chart area when a new song is selected
	selectSongListElement.addEventListener('change', (event) => {

		const selectedIndex = event.target.value;
		outTitleDiv.innerHTML = '&emsp; <b>' + charts[selectedIndex][0] + '</b>'; // Update the selected song title display

		console.log(`Loading song ${outTitleDiv.innerHTML}`);

		var html = charts[selectedIndex][1] + '<table>';

		const cellsPerBar = 4;

		// Split by newlines
		const chartLines = charts[selectedIndex][2].split('\n');

		// Iterate over each line
		chartLines.forEach((line, index) => {
		
			html += '<tr>';

			// Split by tabs
			const lineCells = line.split('\t');

			if( lineCells.length == 1 ) {
				console.log("Reached final empty line of song.");
				return;
			}

			// If first cell contains an optional section name, wrap in a span with boxed style
			html += '<td class="right-justify-cell">';		
			if( lineCells[0] !== "" ) {
				html += `<span class="section-name">${lineCells[0]}</span> `;
			}
			html += '</td>';

			// handle barline at start of line
			html += '<td class="center-justify-cell">𝄀</td>';

			// Process each measure lineCells[i]
			for(let i = 1; i < lineCells.length; i++) {
				if(lineCells[i] === "") {
					console.log("Empty cell.");
				}
				else if(lineCells[i] === "𝄎") {
					html += `<td colspan="${cellsPerBar}" class="center-justify-cell">𝄎</td>`;
				}
				else if(lineCells[i] === "𝄏") {
					html += `<td colspan="${cellsPerBar*2}" class="center-justify-cell">𝄏</td>`;
					i++;
				}
				else {
					let remainingCellsInBar = cellsPerBar;
					const cdotSplit = lineCells[i].split('·');
					for(let cdotSplitIndex = 0; cdotSplitIndex < cdotSplit.length; cdotSplitIndex++) {
						html += '<td>';
						html += cdotSplit[cdotSplitIndex];
						html += '</td>';
						remainingCellsInBar--;

						// existance of cdot indicates an empty beat
						if( cdotSplitIndex + 1 < cdotSplit.length && remainingCellsInBar > 0) {
							html += '<td></td>';
							remainingCellsInBar--;
						}
					}
					while(remainingCellsInBar > 0) {
						html += '<td></td>';
						remainingCellsInBar--;
					}

					// handle barline at end of this measure
					html += '<td class="center-justify-cell">𝄀</td>';
				}
			}

			html += '</tr>';

		});

		html += '</table>';

		outContentsDiv.innerHTML = html;

	});

	// Parse the string into tokens using a space " " as the separator

	// Display the separated tokens
  //  tokens.forEach(token => {
	//console.log(token);
	//});
}

function toggleHideList() {
	if( listDiv.style.display === "none" ) {
		listDiv.style.display = "block";
		outDiv.style.width = "50%";
	}
	else {
		listDiv.style.display = "none";
		outDiv.style.width = "100%";
	}

}

function toggleDarkMode() {
	const html = document.documentElement;
	const currentScheme = getComputedStyle(html).colorScheme;
	html.style.colorScheme = (currentScheme === 'dark') ? 'light' : 'dark';

	// Save preference to localStorage
	localStorage.setItem('theme', html.style.colorScheme);
}

// Get preference from localStorage
const savedTheme = localStorage.getItem('theme');
if (savedTheme) {
	const html = document.documentElement;
	html.style.colorScheme = savedTheme;
}
